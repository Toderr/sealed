<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sealed Agent — Brand Philosophy</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Inter Tight', system-ui, sans-serif; background: #F4F1EA; color: #0B1220; }
  *, *::before, *::after { box-sizing: border-box; }
  ::selection { background: #D6A852; color: #0B1220; }

  @page { size: A4 landscape; margin: 0; }
  @media print {
    html, body { background: #F4F1EA !important; }
    *, *::before, *::after {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
      animation: none !important;
      transition: none !important;
    }
    /* Each section becomes one landscape page */
    section {
      min-height: 0 !important;
      height: 19cm !important;     /* ~A4 landscape inner height */
      width: 29.7cm !important;
      padding: 0.9cm 1.6cm !important;
      page-break-after: always !important;
      break-after: page !important;
      page-break-inside: avoid !important;
      break-inside: avoid !important;
      overflow: hidden !important;
    }
    section:last-child {
      page-break-after: auto !important;
      break-after: auto !important;
    }
    /* Tighten the giant headlines so they fit a print page */
    h1 { font-size: 72px !important; line-height: 0.95 !important; }
    h2 { font-size: 64px !important; line-height: 1 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="logo-final.jsx"></script>
<script type="text/babel" src="philosophy.jsx"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<PhilosophyApp />);
  // Auto-print after fonts + render settle
  (async () => {
    try { await document.fonts.ready; } catch (_) {}
    await new Promise(r => setTimeout(r, 600));
    window.print();
  })();
</script>
</body>
</html>
